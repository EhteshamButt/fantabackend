[build]
  command = "npm run build"
  functions = "netlify/functions"

[functions]
  node_bundler = "none"
  included_files = ["dist/**", "node_modules/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
